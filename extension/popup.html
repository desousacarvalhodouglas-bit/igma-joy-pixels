<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Lovable Debug Tool</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #8b5cf6;
    --accent-2: #3b82f6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 340px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
  }
  h1 {
    font-size: 16px;
    margin: 0 0 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p.sub { margin: 0 0 14px; font-size: 12px; color: var(--muted); }
  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
  input[type="url"] {
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 13px;
    margin-bottom: 12px;
  }
  button {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 0;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: white;
    margin-bottom: 8px;
  }
  button.secondary {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .row { display: flex; gap: 8px; }
  .row button { margin-bottom: 0; }
  .footer { font-size: 11px; color: var(--muted); margin-top: 12px; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
  <h1>🐛 Lovable Debug Tool</h1>
  <p class="sub">Abre o popup de debug em uma janela dedicada.</p>

  <label for="url">URL do seu app</label>
  <input id="url" type="url" placeholder="https://igma-joy-pixels.lovable.app" />

  <button id="open">🚀 Abrir Debug Tool</button>
  <div class="row">
    <button id="login" class="secondary">🔑 Login admin</button>
    <button id="save" class="secondary">💾 Salvar URL</button>
  </div>

  <div class="footer">
    O Debug Tool aparece automaticamente para usuários <b>admin</b>.<br />
    v1.1.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
