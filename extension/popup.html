<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Lovable Debug Tool</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #8b5cf6;
    --accent-2: #3b82f6;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 420px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 14px;
  }
  h1 {
    font-size: 15px;
    margin: 0 0 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p.sub { margin: 0 0 12px; font-size: 11px; color: var(--muted); }
  label { font-size: 11px; color: var(--muted); display: block; margin: 8px 0 4px; }
  input[type="url"], textarea, select {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 110px; }
  button {
    padding: 9px 12px;
    border-radius: 6px;
    border: 0;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: white;
  }
  button.secondary {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .row { display: flex; gap: 6px; margin-top: 8px; }
  .row > * { flex: 1; }
  .images { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .thumb { position: relative; width: 56px; height: 56px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .thumb button {
    position: absolute; top: 1px; right: 1px;
    width: 16px; height: 16px; padding: 0;
    border-radius: 50%; background: var(--danger);
    font-size: 10px; line-height: 1;
  }
  .status { margin-top: 8px; padding: 6px 8px; border-radius: 4px; font-size: 11px; }
  .status.error { background: rgba(239,68,68,0.15); color: #fca5a5; }
  .status.success { background: rgba(34,197,94,0.15); color: #86efac; }
  .status.info { background: rgba(59,130,246,0.15); color: #93c5fd; }
  details { margin-top: 8px; }
  details summary { font-size: 11px; color: var(--muted); cursor: pointer; }
  .footer { font-size: 10px; color: var(--muted); margin-top: 10px; text-align: center; }
</style>
</head>
<body>
  <h1>🐛 Lovable Debug Tool</h1>
  <p class="sub">Envie instrução + imagens diretamente para o Lovable.</p>

  <label for="prompt">Instrução para o Lovable</label>
  <textarea id="prompt" placeholder="Descreva o que você quer que o Lovable faça..."></textarea>

  <label>Imagens (opcional)</label>
  <input type="file" id="files" accept="image/*" multiple style="font-size:11px;color:var(--muted);" />
  <div class="images" id="thumbs"></div>

  <div class="row">
    <button id="send">🚀 Enviar para o Lovable</button>
  </div>

  <div id="status"></div>

  <details>
    <summary>⚙️ Configurações</summary>
    <label for="url">URL do app</label>
    <input id="url" type="url" placeholder="https://igma-joy-pixels.lovable.app" />
    <div class="row">
      <button id="save" class="secondary">💾 Salvar</button>
      <button id="login" class="secondary">🔑 Login</button>
    </div>
  </details>

  <div class="footer">v2.0.0 · standalone</div>

  <script src="popup.js"></script>
</body>
</html>
